<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Claude Capacitor Test</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: env(safe-area-inset-top) 24px env(safe-area-inset-bottom);
            user-select: none;
        }
        h1 { font-size: 28px; margin-bottom: 8px; }
        p { opacity: .8; margin-bottom: 32px; text-align: center; }
        .counter {
            font-size: 96px;
            font-weight: 700;
            margin-bottom: 24px;
            min-width: 160px;
            text-align: center;
        }
        button {
            font-size: 18px;
            font-weight: 600;
            padding: 16px 40px;
            border: none;
            border-radius: 999px;
            background: #fff;
            color: #764ba2;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(0,0,0,.2);
            transition: transform .1s;
        }
        button:active { transform: scale(.96); }
        .info {
            margin-top: 32px;
            font-size: 13px;
            opacity: .7;
        }
    </style>
</head>
<body>
    <h1>Hello, Capacitor!</h1>
    <p>Простое тестовое приложение</p>
    <div class="counter" id="counter">0</div>
    <button id="btn">Нажми меня</button>
    <div class="info" id="info">User-Agent: загрузка…</div>

    <script>
        const counter = document.getElementById('counter');
        const btn = document.getElementById('btn');
        const info = document.getElementById('info');

        let count = 0;
        btn.addEventListener('click', () => {
            count++;
            counter.textContent = count;
        });

        info.textContent = 'UA: ' + navigator.userAgent.slice(0, 80);
    </script>
</body>
</html>
